# Local/production container orchestration.
# Usage: docker compose up --build  →  app at http://localhost:8080
#
# Note: browsers require a secure context (HTTPS or localhost) for the
# microphone and Web Speech APIs, so access the container via localhost or
# put it behind a TLS-terminating reverse proxy.
services:
  linguaarcade:
    build:
      context: .
      dockerfile: Dockerfile
    image: linguaarcade-ai:latest
    container_name: linguaarcade-ai
    ports:
      - "8080:80"
    restart: unless-stopped

# Continuous integration: every push and pull request must pass linting,
# strict type-checking, and a production build before it can merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` (not `npm install`) guarantees the lockfile is honored
      # exactly, so CI builds are reproducible.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The built bundle is uploaded so any CI run can be deployed or
      # inspected without rebuilding locally.
      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  docker:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Building (without pushing) proves the Dockerfile stays deployable.
      - name: Build image
        run: docker build -t linguaarcade-ai:ci .

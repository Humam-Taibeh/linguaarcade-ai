<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inline SVG favicon: zero extra network requests, works offline. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237c6cff'/%3E%3Cstop offset='100%25' stop-color='%2338e0d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='%230b0f1e'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='url(%23g)' font-family='Segoe UI, sans-serif' font-weight='700'%3ELA%3C/text%3E%3C/svg%3E"
    />
    <!-- viewport-fit=cover lets the app paint edge-to-edge behind notches;
         safe-area insets in the CSS keep content out of hardware cutouts. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="LinguaArcade AI — an immersive English learning platform with AI pronunciation analysis, shadowing practice, and conversational AI."
    />
    <!-- Inter variable font: the app's premium typographic voice. display=swap
         keeps first paint instant on the system stack, then upgrades. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&display=swap"
    />
    <!-- Pre-paint theme bootstrap: read the persisted theme synchronously and
         stamp data-theme + a matching background BEFORE the bundle loads, so
         users never see a dark flash in light mode (or vice versa). Must stay
         inline and dependency-free — it runs before any module resolves. -->
    <script>
      (function () {
        var theme = "dark";
        try {
          var saved = JSON.parse(localStorage.getItem("linguaarcade.state.v1"));
          if (saved && saved.settings && saved.settings.theme === "light") {
            theme = "light";
          }
        } catch (e) {
          /* corrupt storage — default theme is fine */
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor =
          theme === "light" ? "#f2f4fa" : "#070a14";
      })();
    </script>
    <title>LinguaArcade AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

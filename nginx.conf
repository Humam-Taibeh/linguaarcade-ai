# nginx config for serving the LinguaArcade AI single-page application.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html so client-side view
    # state survives a page refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must always be revalidated so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic security headers. The microphone/speech APIs require a secure
    # context in browsers; behind a reverse proxy, terminate TLS upstream.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
